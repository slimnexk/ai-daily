<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI百事通 · 每日科技资讯</title>
    <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
    <style>
    :root {
        --bg-primary: #0b0d14;
        --bg-secondary: #111318;
        --bg-card: #181b24;
        --bg-card-hover: #1f2331;
        --accent-cyan: #00e5ff;
        --accent-purple: #a855f7;
        --accent-pink: #ff3d71;
        --accent-green: #00d68f;
        --accent-orange: #ff7b00;
        --accent-blue: #3b82f6;
        --accent-indigo: #6366f1;
        --accent-amber: #f59e0b;
        --accent-rose: #ec4899;
        --accent-teal: #14b8a6;
        --accent-orange2: #f97316;
        --text-primary: #e8ecf4;
        --text-secondary: #8892a4;
        --text-muted: #565d70;
        --border-color: rgba(255,255,255,0.08);
        --border-card: rgba(255,255,255,0.06);
        --sidebar-width: 256px;
        --font-base: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
        font-family: 'Noto Sans SC', sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: var(--font-base);
        line-height: 1.6;
        min-height: 100vh;
        background-image:
            radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.12) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,229,255,0.06) 0%, transparent 50%);
    }
    a { color: inherit; text-decoration: none; }

    /* ═══════════════════ 侧边栏 ═══════════════════ */
    .sidebar {
        width: var(--sidebar-width);
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        height: 100vh;
        position: fixed;
        left: 0; top: 0;
        overflow-y: auto;
        z-index: 100;
        display: flex;
        flex-direction: column;
    }
    .sidebar-header { padding: 18px 14px; border-bottom: 1px solid var(--border-color); }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-icon svg { width: 18px; height: 18px; color: #fff; }
    .logo-text { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; color: var(--text-primary); }
    .logo-sub { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    .calendar-wrap { padding: 12px; border-bottom: 1px solid var(--border-color); }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .cal-month { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .cal-nav { background: none; border: none; color: var(--text-muted); cursor: pointer; width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .cal-nav:hover { background: var(--bg-card); color: var(--text-primary); }
    .cal-nav svg { width: 14px; height: 14px; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
    .cal-weekday { text-align: center; font-size: 9px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; padding: 3px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day {
        aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        border-radius: 7px; font-size: 11px; color: var(--text-muted);
        cursor: pointer; transition: all 0.15s; position: relative; gap: 1px;
    }
    .cal-day:hover:not(.empty):not(.disabled) { background: var(--bg-card); color: var(--text-primary); }
    .cal-day.today { background: rgba(0,229,255,0.1); color: var(--accent-cyan); font-weight: 700; }
    .cal-day.selected { background: var(--accent-cyan); color: #000; font-weight: 700; }
    .cal-day.selected.today { background: var(--accent-cyan); color: #000; }
    .cal-day.empty { cursor: default; }
    .cal-day.disabled { opacity: 0.3; cursor: default; }
    .cal-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent-orange); }
    .cal-day.has-data .cal-dot { display: block; }
    .cal-day:not(.has-data) .cal-dot { display: none; }
    .cal-today-label { position: absolute; top: 2px; right: 3px; font-size: 7px; color: var(--accent-cyan); font-weight: 700; }

    .sidebar-nav { padding: 10px 8px; border-bottom: 1px solid var(--border-color); }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); font-size: 12px; transition: all 0.15s; }
    .nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav-item.active { background: rgba(0,229,255,0.08); color: var(--accent-cyan); }
    .nav-item-icon { display: flex; align-items: center; }
    .nav-item-icon svg { width: 14px; height: 14px; }
    .nav-item-label { flex: 1; }
    .nav-item-count { font-size: 10px; color: var(--text-muted); background: var(--bg-card); padding: 1px 7px; border-radius: 10px; }
    .nav-item.active .nav-item-count { background: rgba(0,229,255,0.15); color: var(--accent-cyan); }

    .sidebar-stats { padding: 12px; border-bottom: 1px solid var(--border-color); }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .stat-box { background: var(--bg-card); border-radius: 8px; padding: 10px 5px; text-align: center; }
    .stat-number { font-size: 17px; font-weight: 700; color: var(--accent-cyan); }
    .stat-text { font-size: 9px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

    .sidebar-categories { padding: 10px 8px; flex: 1; }
    .cat-title-label { font-size: 9px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding: 0 4px; }
    .cat-link { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; color: var(--text-secondary); font-size: 12px; transition: all 0.15s; cursor: pointer; }
    .cat-link:hover { background: var(--bg-card); color: var(--text-primary); }
    .cat-link.active { background: var(--bg-card-hover); color: var(--text-primary); font-weight: 500; }
    .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { flex: 1; }
    .cat-count { font-size: 10px; color: var(--text-muted); }

    .sidebar-footer { padding: 12px 14px; border-top: 1px solid var(--border-color); margin-top: auto; }
    .footer-text { font-size: 10px; color: var(--text-muted); text-align: center; }

    /* ═══════════════════ 主内容 ═══════════════════ */
    .main { margin-left: var(--sidebar-width); background: var(--bg-primary); min-height: 100vh; }

    .hero {
        padding: 24px 38px 20px;
        background: linear-gradient(180deg, rgba(17,19,24,0.9) 0%, transparent 100%);
        border-bottom: 1px solid var(--border-color);
        position: relative;
    }
    .hero::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3), rgba(168,85,247,0.2), transparent);
    }
    .hero-date { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .hero-date::before { content: ''; width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .hero-badges { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .hero-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; }
    .badge-hot { background: linear-gradient(135deg, var(--accent-pink), #ff6b9d); color: white; }
    .badge-new { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: white; }
    .hero-title { font-size: 28px; font-weight: 900; line-height: 1.25; margin-bottom: 9px; background: linear-gradient(135deg, #fff 0%, #a0a0b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-desc { font-size: 14px; color: var(--text-secondary); max-width: 700px; line-height: 1.7; }
    .hero-stats { display: flex; gap: 28px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border-color); }
    .hero-stat { display: flex; flex-direction: column; }
    .hero-stat-val { font-size: 22px; font-weight: 700; color: var(--accent-cyan); }
    .hero-stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .content { padding: 26px 38px 60px; }

    .featured { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 32px; }
    .featured-card {
        background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px;
        padding: 20px; position: relative; overflow: hidden; transition: all 0.3s;
    }
    .featured-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1); }
    .featured-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
    .featured-card.orange::before { background: var(--accent-orange); }
    .featured-card.pink::before { background: var(--accent-rose); }
    .featured-card.cyan::before { background: var(--accent-cyan); }
    .featured-card.purple::before { background: var(--accent-purple); }
    .featured-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 5px; }
    .featured-card.orange .featured-label { color: var(--accent-orange); }
    .featured-card.pink .featured-label { color: var(--accent-rose); }
    .featured-card.cyan .featured-label { color: var(--accent-cyan); }
    .featured-card.purple .featured-label { color: var(--accent-purple); }
    .featured-title { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
    .featured-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
    .featured-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 10px; font-size: 12px; color: var(--accent-cyan); }
    .featured-link:hover { text-decoration: underline; }
    .featured-link svg { width: 12px; height: 12px; }

    .cat-section { margin-bottom: 30px; }
    .cat-section.hidden { display: none; }
    .cat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .cat-icon {
        width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cat-icon svg { width: 16px; height: 16px; color: #fff; }
    .cat-icon.llm    { background: linear-gradient(135deg, var(--accent-blue), #1d4ed8); }
    .cat-icon.github { background: linear-gradient(135deg, var(--accent-indigo), #4f46e5); }
    .cat-icon.devtools { background: linear-gradient(135deg, var(--accent-green), #059669); }
    .cat-icon.design { background: linear-gradient(135deg, var(--accent-amber), #d97706); }
    .cat-icon.world { background: linear-gradient(135deg, var(--accent-rose), #db2777); }
    .cat-icon.video { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .cat-icon.rag { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .cat-icon.industry { background: linear-gradient(135deg, var(--accent-teal), #0d9488); }
    .cat-icon.game { background: linear-gradient(135deg, var(--accent-orange2), #ea580c); }
    .cat-icon.drama { background: linear-gradient(135deg, #d946ef, #a855f7); }
    .cat-icon.apps { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
    .cat-title { font-size: 15px; font-weight: 700; }
    .cat-count-badge { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 5px; }
    .cat-rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-color), transparent); }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }
    .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; transition: all 0.2s; }
    .card:hover { background: var(--bg-card-hover); transform: translateY(-2px); border-color: rgba(255,255,255,0.14); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .card-title { font-size: 13px; font-weight: 600; line-height: 1.5; margin-bottom: 7px; }
    .card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
    .card-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 11px; color: var(--accent-cyan); }
    .card-link:hover { text-decoration: underline; }
    .card-link svg { width: 11px; height: 11px; }

    .trend-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; transition: all 0.2s; }
    .trend-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); border-color: rgba(255,255,255,0.14); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .trend-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .trend-icon-wrap { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .trend-icon-wrap svg { width: 16px; height: 16px; color: #fff; }
    .trend-icon-wrap.ai { background: linear-gradient(135deg, var(--accent-purple), #7c3aed); }
    .trend-icon-wrap.skill { background: linear-gradient(135deg, var(--accent-orange), #ea580c); }
    .trend-icon-wrap.agent { background: linear-gradient(135deg, var(--accent-cyan), #0891b2); }
    .trend-name { font-size: 13px; font-weight: 700; }
    .trend-meta { font-size: 10px; color: var(--text-muted); }
    .trend-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 8px; }
    .trend-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .trend-tag { font-size: 9px; padding: 2px 7px; border-radius: 10px; background: rgba(255,255,255,0.06); color: var(--text-muted); }
    .trend-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 11px; color: var(--accent-cyan); }
    .trend-link:hover { text-decoration: underline; }
    .trend-link svg { width: 11px; height: 11px; }

    .empty-state { text-align: center; padding: 64px 40px; color: var(--text-muted); }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; display: flex; justify-content: center; }
    .empty-state-icon svg { width: 48px; height: 48px; opacity: 0.3; }
    .empty-state h3 { font-size: 17px; color: var(--text-secondary); margin-bottom: 7px; }
    .empty-state p { font-size: 13px; }

    .loading-state { text-align: center; padding: 64px 40px; color: var(--text-muted); }
    .loading-spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border-color); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { padding: 20px 38px; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-muted); font-size: 11px; }
    footer a { color: var(--accent-cyan); }

    /* ═══════════════════ 模式切换栏 ═══════════════════ */
    .view-mode-bar {
        display: flex; gap: 14px;
        padding: 18px 38px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
    }
    .view-mode-tab {
        flex: 1;
        padding: 16px 24px;
        border-radius: 14px;
        font-size: 16px; font-weight: 700;
        cursor: pointer;
        transition: all 0.25s;
        display: flex; align-items: center; justify-content: center; gap: 10px;
        border: 2px solid transparent;
        background: var(--bg-card);
        color: var(--text-secondary);
    }
    .view-mode-tab:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    /* AI行业资讯 - 青蓝色调 */
    .view-mode-tab.ai {
        background: linear-gradient(135deg, rgba(0,229,255,0.06), rgba(99,102,241,0.04));
        border-color: rgba(0,229,255,0.2);
        color: var(--accent-cyan);
    }
    .view-mode-tab.ai:hover {
        background: linear-gradient(135deg, rgba(0,229,255,0.1), rgba(99,102,241,0.06));
        border-color: rgba(0,229,255,0.4);
    }
    .view-mode-tab.ai.active {
        background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(99,102,241,0.1));
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
        box-shadow: 0 0 28px rgba(0,229,255,0.15);
    }
    /* 社会热点 - 粉红色调 */
    .view-mode-tab.hot {
        background: linear-gradient(135deg, rgba(255,61,113,0.06), rgba(236,72,153,0.04));
        border-color: rgba(255,61,113,0.2);
        color: var(--accent-pink);
    }
    .view-mode-tab.hot:hover {
        background: linear-gradient(135deg, rgba(255,61,113,0.1), rgba(236,72,153,0.06));
        border-color: rgba(255,61,113,0.4);
    }
    .view-mode-tab.hot.active {
        background: linear-gradient(135deg, rgba(255,61,113,0.15), rgba(236,72,153,0.1));
        border-color: var(--accent-pink);
        color: var(--accent-pink);
        box-shadow: 0 0 28px rgba(255,61,113,0.15);
    }
    .view-mode-tab svg { width: 20px; height: 20px; }
    .view-mode-tab .tab-count {
        font-size: 12px; font-weight: 500; opacity: 0.65;
        background: rgba(255,255,255,0.08);
        padding: 2px 8px;
        border-radius: 10px;
        margin-left: 4px;
    }

    @media (max-width: 900px) {
        .sidebar { width: 100%; height: auto; position: relative; }
        .main { margin-left: 0; }
        .hero, .content, footer { padding-left: 16px; padding-right: 16px; }
        .featured { grid-template-columns: 1fr; }
        .hero-title { font-size: 22px; }
    }
    </style>
</head>
<body>

<!-- ═══════════════════ 侧边栏 ═══════════════════ -->
<aside class="sidebar">

    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-icon"><i data-lucide="zap"></i></div>
            <div>
                <div class="logo-text">AI百事通</div>
                <div class="logo-sub">每日 AI 科技精选</div>
            </div>
        </div>
    </div>

    <div class="calendar-wrap">
        <div class="cal-header">
            <button class="cal-nav" id="calPrev" aria-label="上一月"><i data-lucide="chevron-left"></i></button>
            <span class="cal-month" id="calMonthLabel">2026年4月</span>
            <button class="cal-nav" id="calNext" aria-label="下一月"><i data-lucide="chevron-right"></i></button>
        </div>
        <div class="cal-weekdays">
            <div class="cal-weekday">一</div><div class="cal-weekday">二</div><div class="cal-weekday">三</div>
            <div class="cal-weekday">四</div><div class="cal-weekday">五</div><div class="cal-weekday">六</div><div class="cal-weekday">日</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
    </div>

    <nav class="sidebar-nav">
        <a href="#all" class="nav-item active" id="nav-today" onclick="showAll(event)">
            <span class="nav-item-icon"><i data-lucide="layout-list"></i></span>
            <span class="nav-item-label">今日资讯</span>
            <span class="nav-item-count" id="nav-count-today">-</span>
        </a>
        <a href="#sec-featured" class="nav-item" data-nav="featured" onclick="jumpToCat('featured', event)">
            <span class="nav-item-icon"><i data-lucide="star"></i></span>
            <span class="nav-item-label">热门资讯</span>
            <span class="nav-item-count" id="nav-count-featured">4</span>
        </a>
        <a href="#sec-hotSearch" class="nav-item" data-nav="hotSearch" onclick="jumpToCat('hotSearch', event)">
            <span class="nav-item-icon"><i data-lucide="flame"></i></span>
            <span class="nav-item-label">热搜榜</span>
            <span class="nav-item-count" id="nav-count-hotSearch">10</span>
        </a>
    </nav>

    <div class="sidebar-stats">
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-number" id="stat-total">-</div><div class="stat-text">资讯</div></div>
            <div class="stat-box"><div class="stat-number" id="stat-cats">13</div><div class="stat-text">分类</div></div>
            <div class="stat-box"><div class="stat-number" id="stat-days">-</div><div class="stat-text">天</div></div>
        </div>
    </div>

    <div class="sidebar-categories" id="sidebarCategories">
        <div class="cat-title-label">分类浏览</div>
        <!-- 动态生成 -->
    </div>

    <div class="sidebar-footer">
        <div class="footer-text">每日 9:00 自动更新</div>
    </div>
</aside>

<!-- ═══════════════════ 主内容 ═══════════════════ -->
<div class="main" id="mainContent">

    <div class="hero">
        <div class="hero-date" id="hero-date">加载中...</div>
        <div class="hero-badges">
            <span class="hero-badge badge-hot">🔥 热门</span>
            <span class="hero-badge badge-new">🆕 今日更新</span>
        </div>
        <h1 class="hero-title" id="hero-title">加载中...</h1>
        <p class="hero-desc" id="hero-desc"></p>
        <div class="hero-stats">
            <div class="hero-stat"><span class="hero-stat-val" id="hero-total">-</span><span class="hero-stat-lbl">资讯</span></div>
            <div class="hero-stat"><span class="hero-stat-val" id="hero-cats">13</span><span class="hero-stat-lbl">分类</span></div>
            <div class="hero-stat"><span class="hero-stat-val" id="hero-date-str">-</span><span class="hero-stat-lbl">更新</span></div>
        </div>
    </div>

    <!-- 模式切换栏 -->
    <div class="view-mode-bar">
        <button class="view-mode-tab ai active" onclick="switchViewMode('ai')">
            <i data-lucide="cpu"></i> AI行业资讯 <span class="tab-count" id="tab-count-ai">--</span>
        </button>
        <button class="view-mode-tab hot" onclick="switchViewMode('hot')">
            <i data-lucide="flame"></i> 社会热点 <span class="tab-count" id="tab-count-hot">--</span>
        </button>
    </div>

    <div class="content" id="contentBody">
        <div class="loading-state" id="loading-state">
            <div class="loading-spinner"></div>
            <p>正在加载资讯数据...</p>
        </div>
        <div id="dynamic-content"></div>
    </div>

    <footer>
        <p>Powered by <a href="#">OpenClaw</a> · 每日 9:00 自动更新 · 数据来源:真实搜索</p>
    </footer>
</div>

<script>
// ═══════════════════ 分类元数据 ═══════════════════
var catMeta = {
    hotSearch:  { label: '热搜榜',             sublabel: '抖音/微博',  icon: 'flame',        bgStyle: 'background:linear-gradient(135deg,#ff3d71,#ff6b9d)',  dotColor: '#ff3d71', cssClass: '' },
    trend:      { label: 'GitHub 热门技术',     sublabel: 'Agent/Skill', icon: 'trending-up', bgStyle: 'background:linear-gradient(135deg,#f97316,#ea580c)',  dotColor: '#f97316', cssClass: '' },
    llm:        { label: '大模型动态',           sublabel: '',           icon: 'brain',        cssClass: 'llm',       dotColor: '#3b82f6' },
    github:     { label: 'GitHub 热点项目',      sublabel: '',           icon: 'git-branch',   cssClass: 'github',    dotColor: '#6366f1' },
    devtools:   { label: 'AI开发工具',           sublabel: '',           icon: 'wrench',       cssClass: 'devtools',  dotColor: '#10b981' },
    design:     { label: 'AI设计 & 创作工具',    sublabel: '',           icon: 'palette',      cssClass: 'design',    dotColor: '#f59e0b' },
    world:      { label: '世界模型',             sublabel: '',           icon: 'globe',        cssClass: 'world',     dotColor: '#ec4899' },
    video:      { label: '视频 / 图片生成',      sublabel: '',           icon: 'video',        cssClass: 'video',     dotColor: '#ef4444' },
    rag:        { label: '知识库 & RAG 技术',    sublabel: '',           icon: 'database',     cssClass: 'rag',       dotColor: '#8b5cf6' },
    industry:   { label: 'AI行业资讯',           sublabel: '',           icon: 'building-2',   cssClass: 'industry',  dotColor: '#14b8a6' },
    game:       { label: 'AI游戏设计',           sublabel: '',           icon: 'gamepad-2',    cssClass: 'game',      dotColor: '#f97316' },
    drama:      { label: 'AI漫剧',              sublabel: '',           icon: 'clapperboard', cssClass: 'drama',     dotColor: '#d946ef' },
    apps:       { label: 'AI应用',              sublabel: '',           icon: 'smartphone',   cssClass: 'apps',      dotColor: '#0ea5e9' }
};
var catOrder = ['hotSearch','trend','llm','github','devtools','design','world','video','rag','industry','game','drama','apps'];

// ═══════════════════ 全局状态 ═══════════════════
var allData = null;         // data.json 元数据（标题+desc+日期列表）
var dayCache = {};          // 缓存已加载的 daily/日期.json 数据
var dataDates = [];
var selectedDate = '';
var activeCat = 'all';
var viewMode = 'ai';  // 'ai' | 'hot'
var aiCategories = ['trend','llm','github','devtools','design','world','video','rag','industry','game','drama','apps'];
var hotCategories = ['hotSearch'];
var viewYear, viewMonth;

// ═══════════════════ 初始化 ═══════════════════
function init() {
    var now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();

    fetch('./data.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            allData = data;
            dataDates = Object.keys(data.dates).sort();
            var today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
            var initial = dataDates.indexOf(today) !== -1 ? today : (dataDates.length ? dataDates[dataDates.length-1] : today);
            selectedDate = initial;
            renderSidebarCategories();
            renderCalendar();
            loadDateContent(initial, true);  // 首次加载
        })
        .catch(function(err) {
            document.getElementById('loading-state').innerHTML = '<p>数据加载失败: ' + err.message + '</p>';
        });
}

// ═══════════════════ 侧边栏分类 ═══════════════════
function renderSidebarCategories() {
    var container = document.getElementById('sidebarCategories');
    var dayData = dayCache[selectedDate] || null;
    var html = '<div class="cat-title-label">分类浏览</div>';
    html += '<a href="#all" class="cat-link active" data-cat="all" onclick="filterCat(\'all\', event)">' +
        '<span class="cat-dot" style="background:#64748b;"></span><span class="cat-name">全部分类</span><span class="cat-count" id="cc-all">' + (dayData ? countAll(dayData) : 0) + '</span></a>';

    catOrder.forEach(function(cat) {
        var meta = catMeta[cat];
        var count = dayData && dayData[cat] ? dayData[cat].length : 0;
        html += '<a href="#sec-' + cat + '" class="cat-link" data-cat="' + cat + '" onclick="filterCat(\'' + cat + '\', event)">' +
            '<span class="cat-dot" style="background:' + meta.dotColor + ';"></span>' +
            '<span class="cat-name">' + meta.label + '</span>' +
            '<span class="cat-count" id="cc-' + cat + '">' + count + '</span></a>';
    });
    container.innerHTML = html;
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function countAll(dayData) {
    var n = 0;
    catOrder.forEach(function(cat) { if (dayData[cat]) n += dayData[cat].length; });
    return n;
}

// ═══════════════════ 日历 ═══════════════════
function renderCalendar() {
    var grid = document.getElementById('calGrid');
    var label = document.getElementById('calMonthLabel');
    label.textContent = viewYear + '年' + (viewMonth + 1) + '月';

    var firstDay = new Date(viewYear, viewMonth, 1).getDay();
    var startOffset = firstDay === 0 ? 6 : firstDay - 1;
    var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    var today = new Date();
    var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    var isCurrentMonth = (today.getFullYear() === viewYear && today.getMonth() === viewMonth);
    var todayDay = today.getDate();

    var html = '';
    for (var i = startOffset - 1; i >= 0; i--) html += '<div class="cal-day empty"></div>';
    for (var d = 1; d <= daysInMonth; d++) {
        var ds = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        var isToday = isCurrentMonth && d === todayDay;
        var isSel = ds === selectedDate;
        var hasData = dataDates.indexOf(ds) !== -1;
        var isFuture = new Date(ds) > new Date(todayStr);
        var cls = 'cal-day' + (isToday ? ' today' : '') + (isSel ? ' selected' : '') + (hasData ? ' has-data' : '') + (isFuture ? ' disabled' : '');
        html += '<div class="' + cls + '" data-date="' + ds + '" onclick="selectDate(\'' + ds + '\')">' +
            '<span>' + d + '</span><span class="cal-dot"></span>' + (isToday ? '<span class="cal-today-label">今</span>' : '') + '</div>';
    }
    grid.innerHTML = html;
}

function selectDate(ds) {
    if (new Date(ds) > new Date()) return;
    selectedDate = ds;
    activeCat = 'all';
    renderCalendar();
    // 切换日期时显示 loading
    var loading = document.getElementById('loading-state');
    var dyn = document.getElementById('dynamic-content');
    loading.style.display = '';
    dyn.innerHTML = '';
    loadDateContent(ds);
}

document.getElementById('calPrev').onclick = function() { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar(); };
document.getElementById('calNext').onclick = function() { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar(); };

// ═══════════════════ 加载日期内容（异步加载 daily/日期.json） ═══════════════════
function loadDateContent(dateStr, isInitial) {
    var loading = document.getElementById('loading-state');
    var dyn = document.getElementById('dynamic-content');
    
    // 先显示加载状态
    if (isInitial) {
        loading.style.display = '';
        dyn.innerHTML = '';
    } else {
        loading.style.display = '';
    }

    // 更新Hero日期（先显示日期，内容稍后）
    var dateLabel = formatDateCN(dateStr);
    document.getElementById('hero-date').textContent = dateLabel;
    document.getElementById('hero-title').textContent = '加载中...';
    document.getElementById('hero-desc').textContent = '';

    // 如果已缓存，直接用；否则异步加载
    if (dayCache[dateStr]) {
        renderDayData(dateStr, dayCache[dateStr]);
        return;
    }

    fetch('./daily/' + dateStr + '.json')
        .then(function(r) {
            if (!r.ok) throw new Error('404');
            return r.json();
        })
        .then(function(dayData) {
            dayCache[dateStr] = dayData;
            renderDayData(dateStr, dayData);
        })
        .catch(function() {
            dayCache[dateStr] = null;
            renderDayData(dateStr, null);
        });
}

// ═══════════════════ 渲染日期数据 ═══════════════════
function renderDayData(dateStr, dayData) {
    var loading = document.getElementById('loading-state');
    var dyn = document.getElementById('dynamic-content');
    loading.style.display = 'none';

    var dateLabel = formatDateCN(dateStr);
    document.getElementById('hero-date').textContent = dateLabel;

    if (dayData) {
        if (viewMode === 'hot') {
            document.getElementById('hero-title').textContent = '今日热搜 · 社会热点';
            document.getElementById('hero-desc').textContent = '抖音/微博实时热搜，了解当下最火话题';
        } else {
            document.getElementById('hero-title').textContent = dayData.title || '暂无资讯';
            document.getElementById('hero-desc').textContent = dayData.desc || '';
        }
        var total = countAll(dayData);
        var aiTotal = countCategories(dayData, aiCategories) + (dayData.featured ? dayData.featured.length : 0);
        var hotTotal = dayData.hotSearch ? dayData.hotSearch.length : 0;
        document.getElementById('hero-total').textContent = total;
        document.getElementById('hero-date-str').textContent = dateStr;
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-days').textContent = dataDates.length;
        document.getElementById('nav-count-today').textContent = total;
        document.getElementById('nav-count-featured').textContent = dayData.featured ? dayData.featured.length : 0;
        document.getElementById('nav-count-hotSearch').textContent = hotTotal;
        document.getElementById('tab-count-ai').textContent = aiTotal + '条';
        document.getElementById('tab-count-hot').textContent = hotTotal + '条';
    } else {
        document.getElementById('hero-title').textContent = '暂无资讯';
        document.getElementById('hero-desc').textContent = '该日期暂无资讯记录。';
        document.getElementById('hero-total').textContent = '-';
        document.getElementById('hero-date-str').textContent = dateStr;
        document.getElementById('stat-total').textContent = '0';
        document.getElementById('stat-days').textContent = dataDates.length;
        document.getElementById('tab-count-ai').textContent = '0条';
        document.getElementById('tab-count-hot').textContent = '0条';
    }

    // 更新侧边栏分类计数
    renderSidebarCategories();

    // 渲染内容
    dyn.innerHTML = dayData ? renderDay(dayData) : renderEmpty(dateStr);
    if (typeof lucide !== 'undefined') lucide.createIcons();
    applyViewMode();
    updateSidebarForMode();
}

function countCategories(dayData, cats) {
    var n = 0;
    cats.forEach(function(cat) { if (dayData[cat]) n += dayData[cat].length; });
    return n;
}

function formatDateCN(ds) {
    var p = ds.split('-');
    var days = ['日','一','二','三','四','五','六'];
    var d = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
    return p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日 星期' + days[d.getDay()];
}

// ═══════════════════ 渲染模板 ═══════════════════
function renderDay(data) {
    var html = '';
    // 头条
    if (data.featured && data.featured.length) html += renderFeatured(data.featured);
    // 各分类
    catOrder.forEach(function(cat) {
        if (data[cat] && data[cat].length) {
            if (cat === 'hotSearch') html += renderHotSearchSection(data[cat]);
            else if (cat === 'trend') html += renderTrendSection(data[cat]);
            else html += renderCatSection(cat, data[cat]);
        }
    });
    return html;
}

function renderFeatured(items) {
    var html = '<div class="featured" id="featured-section">';
    items.forEach(function(item) {
        html += '<article class="featured-card ' + item.color + '">' +
            '<span class="featured-label"><i data-lucide="' + item.icon + '" style="width:12px;height:12px;"></i> ' + item.label + '</span>' +
            '<h3 class="featured-title">' + esc(item.title) + '</h3>' +
            '<p class="featured-desc">' + esc(item.desc) + '</p>' +
            (item.url ? '<a href="' + esc(item.url) + '" target="_blank" class="featured-link">阅读原文 <i data-lucide="arrow-right" style="width:12px;height:12px;"></i></a>' : '') +
            '</article>';
    });
    html += '</div>';
    return html;
}

function renderHotSearchSection(items) {
    var meta = catMeta.hotSearch;
    var html = '<section class="cat-section" id="sec-hotSearch" data-cat="hotSearch">' +
        '<div class="cat-header"><div class="cat-icon" style="' + meta.bgStyle + '"><i data-lucide="' + meta.icon + '"></i></div>' +
        '<h2 class="cat-title">' + meta.label + ' <span class="cat-count-badge">' + items.length + '条 · ' + meta.sublabel + '</span></h2>' +
        '<div class="cat-rule"></div></div><div class="cards-grid">';
    items.forEach(function(item) {
        html += '<div class="card"><h3 class="card-title">' + esc(item.title) + '</h3>' +
            (item.source ? '<p class="card-desc">来源: ' + esc(item.source) + '</p>' : '') +
            (item.url ? '<a href="' + esc(item.url) + '" target="_blank" class="card-link">阅读原文 <i data-lucide="arrow-right" style="width:11px;height:11px;"></i></a>' : '') +
            '</div>';
    });
    html += '</div></section>';
    return html;
}

function renderTrendSection(items) {
    var meta = catMeta.trend;
    var html = '<section class="cat-section" id="sec-trend" data-cat="trend">' +
        '<div class="cat-header"><div class="cat-icon" style="' + meta.bgStyle + '"><i data-lucide="' + meta.icon + '"></i></div>' +
        '<h2 class="cat-title">' + meta.label + ' <span class="cat-count-badge">' + items.length + '条 · ' + meta.sublabel + '</span></h2>' +
        '<div class="cat-rule"></div></div><div class="cards-grid">';
    items.forEach(function(item) {
        html += '<div class="trend-card"><div class="trend-top">' +
            '<div class="trend-icon-wrap ' + item.iconType + '"><i data-lucide="' + item.icon + '"></i></div>' +
            '<div><div class="trend-name">' + esc(item.name) + '</div>' +
            '<div class="trend-meta">' + esc(item.stars) + ' · ' + esc(item.type) + '</div></div></div>' +
            '<p class="trend-desc">' + esc(item.desc) + '</p>';
        if (item.tags && item.tags.length) {
            html += '<div class="trend-tags">';
            item.tags.forEach(function(t) { html += '<span class="trend-tag">' + esc(t) + '</span>'; });
            html += '</div>';
        }
        if (item.url) html += '<a href="' + esc(item.url) + '" target="_blank" class="trend-link">GitHub <i data-lucide="external-link" style="width:11px;height:11px;"></i></a>';
        html += '</div>';
    });
    html += '</div></section>';
    return html;
}

function renderCatSection(cat, items) {
    var meta = catMeta[cat];
    var bgAttr = meta.cssClass ? 'class="cat-icon ' + meta.cssClass + '"' : 'style="' + meta.bgStyle + '"';
    var html = '<section class="cat-section" id="sec-' + cat + '" data-cat="' + cat + '">' +
        '<div class="cat-header"><div class="cat-icon" ' + bgAttr + '><i data-lucide="' + meta.icon + '"></i></div>' +
        '<h2 class="cat-title">' + meta.label + ' <span class="cat-count-badge">' + items.length + '条</span></h2>' +
        '<div class="cat-rule"></div></div><div class="cards-grid">';
    items.forEach(function(item) {
        html += '<div class="card"><h3 class="card-title">' + esc(item.title) + '</h3>' +
            '<p class="card-desc">' + esc(item.desc) + '</p>' +
            (item.url ? '<a href="' + esc(item.url) + '" target="_blank" class="card-link">阅读原文 <i data-lucide="arrow-right" style="width:11px;height:11px;"></i></a>' : '') +
            '</div>';
    });
    html += '</div></section>';
    return html;
}

function renderEmpty(dateStr) {
    return '<div class="empty-state"><div class="empty-state-icon"><i data-lucide="inbox"></i></div>' +
        '<h3>' + dateStr + ' 暂无资讯</h3>' +
        '<p>内容将于每天 9:00(Asia/Shanghai)自动更新。</p></div>';
}

function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════ 分类筛选 ═══════════════════
// ═══════════════════ 模式切换 ═══════════════════
function switchViewMode(mode) {
    viewMode = mode;
    activeCat = 'all';
    
    // 更新按钮状态
    document.querySelectorAll('.view-mode-tab').forEach(function(btn) {
        btn.classList.remove('active');
    });
    document.querySelector('.view-mode-tab.' + mode).classList.add('active');
    
    // 应用过滤
    applyViewMode();
    updateSidebarForMode();
    
    // 更新hero标题
    var dayData = allData && allData.dates[selectedDate] ? allData.dates[selectedDate] : null;
    if (dayData) {
        if (mode === 'hot') {
            document.getElementById('hero-title').textContent = '今日热搜 · 社会热点';
            document.getElementById('hero-desc').textContent = '抖音/微博实时热搜，了解当下最火话题';
        } else {
            document.getElementById('hero-title').textContent = dayData.title || 'AI行业资讯';
            document.getElementById('hero-desc').textContent = dayData.desc || '';
        }
    }
}

function applyViewMode() {
    var featured = document.getElementById('featured-section');
    var sections = document.querySelectorAll('#dynamic-content > .cat-section');
    
    if (viewMode === 'ai') {
        // AI模式：显示featured + AI分类，隐藏hotSearch
        if (featured) featured.style.display = '';
        sections.forEach(function(s) {
            var cat = s.dataset.cat;
            var isAI = aiCategories.indexOf(cat) !== -1;
            s.classList.toggle('hidden', !isAI);
            s.style.display = isAI ? '' : 'none';
        });
    } else if (viewMode === 'hot') {
        // 热点模式：只显示hotSearch，隐藏其他
        if (featured) featured.style.display = 'none';
        sections.forEach(function(s) {
            var isHot = s.dataset.cat === 'hotSearch';
            s.classList.toggle('hidden', !isHot);
            s.style.display = isHot ? '' : 'none';
        });
    }
}

function updateSidebarForMode() {
    var visibleCats = viewMode === 'hot' ? hotCategories : aiCategories;
    
    // 更新分类计数显示
    document.querySelectorAll('.cat-link').forEach(function(el) {
        var cat = el.dataset.cat;
        if (cat === 'all') {
            el.style.display = '';
            return;
        }
        var visible = visibleCats.indexOf(cat) !== -1 || (viewMode === 'ai' && cat === 'featured');
        el.style.display = visible ? '' : 'none';
    });
    
    // 更新导航区
    var navHotSearch = document.querySelector('[data-nav="hotSearch"]');
    var navFeatured = document.querySelector('[data-nav="featured"]');
    if (navHotSearch) navHotSearch.style.display = viewMode === 'hot' ? '' : 'none';
    if (navFeatured) navFeatured.style.display = viewMode === 'ai' ? '' : 'none';
}

function filterCat(cat, e) {
    if (e) e.preventDefault();
    activeCat = cat;

    document.querySelectorAll('.cat-link').forEach(function(el) {
        el.classList.toggle('active', el.dataset.cat === cat);
    });
    document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });

    var featured = document.getElementById('featured-section');
    var sections = document.querySelectorAll('#dynamic-content > .cat-section');
    if (cat === 'all') {
        applyViewMode();
        document.getElementById('nav-today').classList.add('active');
    } else if (cat === 'featured') {
        if (featured) featured.style.display = '';
        sections.forEach(function(s){ s.style.display = 'none'; s.classList.add('hidden'); });
    } else {
        if (featured) featured.style.display = 'none';
        sections.forEach(function(s){
            var match = (s.dataset.cat === cat);
            s.classList.toggle('hidden', !match);
            s.style.display = match ? '' : 'none';
        });
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function jumpToCat(cat, e) {
    if (e) e.preventDefault();
    filterCat(cat, null);
    document.querySelectorAll('.nav-item').forEach(function(el) {
        el.classList.toggle('active', el.dataset && el.dataset.nav === cat);
    });
    var el = document.getElementById('sec-' + cat);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showAll(e) {
    if (e) e.preventDefault();
    filterCat('all', null);
    document.getElementById('nav-today').classList.add('active');
}

// ★ 启动 ★
init();
</script>
</body>
</html>
