<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI科技日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e7;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .date { color: #71717a; font-size: 1rem; }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .section-title {
            font-size: 1.25rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .icon { font-size: 1.5rem; }
        .item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .item:last-child { border-bottom: none; }
        .item-title {
            color: #fff;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .item-desc { color: #a1a1aa; font-size: 0.9rem; }
        .item-solve { color: #4ade80; font-size: 0.85rem; margin-top: 4px; }
        .footer {
            text-align: center;
            padding: 40px 0;
            color: #52525b;
            font-size: 0.875rem;
        }
        .loading { text-align: center; padding: 40px; color: #71717a; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI科技日报</h1>
            <p class="date" id="date"></p>
        </header>
        
        <div id="content">
            <div class="loading">加载中...</div>
        </div>
        
        <footer class="footer">
            <p>由 AI 自动整理 · 每日更新</p>
        </footer>
    </div>
    
    <script>
        document.getElementById('date').textContent = new Date().toLocaleDateString('zh-CN', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            weekday: 'long'
        });
        
        // 从当前目录的 data.json 加载数据
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                renderContent(data);
            })
            .catch(() => {
                document.getElementById('content').innerHTML = '<div class="loading">暂无数据，请稍后再试</div>';
            });
        
        function renderContent(data) {
            const sections = [
                { key: 'llm', title: '🤖 大模型动态', icon: '🤖' },
                { key: 'github', title: '🔥 GitHub热门', icon: '🔥' },
                { key: 'video', title: '🎬 视频/图片模型', icon: '🎬' },
                { key: 'devtools', title: '🛠️ 开发工具/新思路', icon: '🛠️' },
                { key: 'rag', title: '💡 知识库/上下文突破', icon: '💡' },
                { key: 'other', title: '🌐 其他AI进展', icon: '🌐' }
            ];
            
            let html = '';
            sections.forEach(sec => {
                const items = data[sec.key] || [];
                if (items.length === 0) return;
                
                html += `<div class="section">
                    <h2 class="section-title"><span class="icon">${sec.icon}</span>${sec.title}</h2>`;
                
                items.forEach(item => {
                    html += `<div class="item">
                        <div class="item-title">${item.title}</div>
                        <div class="item-desc">${item.desc}</div>
                        ${item.solve ? `<div class="item-solve">✓ ${item.solve}</div>` : ''}
                    </div>`;
                });
                
                html += '</div>';
            });
            
            document.getElementById('content').innerHTML = html;
        }
    </script>
</body>
</html>
