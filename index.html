<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI科技日报 | 2026年4月22日</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #16161f;
            --bg-card-hover: #1c1c28;
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-gradient: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6b6b7b;
            --border-color: rgba(255,255,255,0.08);
            --glow-primary: rgba(0,212,255,0.3);
            --glow-secondary: rgba(124,58,237,0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Background Effects */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-effects::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, var(--glow-primary) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, var(--glow-secondary) 0%, transparent 50%);
            opacity: 0.15;
            animation: bgPulse 15s ease-in-out infinite;
        }
        
        .grid-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
        }
        
        @keyframes bgPulse {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }
        
        /* Header */
        header {
            position: relative;
            z-index: 10;
            padding: 60px 20px 40px;
            text-align: center;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 16px;
        }
        
        .date-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Main Content */
        main {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Categories */
        .category {
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }
        
        .category:nth-child(1) { animation-delay: 0.1s; }
        .category:nth-child(2) { animation-delay: 0.2s; }
        .category:nth-child(3) { animation-delay: 0.3s; }
        .category:nth-child(4) { animation-delay: 0.4s; }
        .category:nth-child(5) { animation-delay: 0.5s; }
        .category:nth-child(6) { animation-delay: 0.6s; }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .category-icon {
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .category-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .category-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color), transparent);
        }
        
        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            border-color: rgba(0,212,255,0.2);
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(0,212,255,0.1);
            color: var(--accent-primary);
            font-size: 12px;
            border-radius: 6px;
            margin-top: 16px;
        }
        
        /* Loading State */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            gap: 16px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        /* Footer */
        footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
        }
        
        footer a {
            color: var(--accent-primary);
            text-decoration: none;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 40px 16px 30px;
            }
            
            .logo-text {
                font-size: 22px;
            }
            
            .category-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .category-line {
                width: 100%;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="grid-pattern"></div>
    </div>
    
    <header>
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">AI 科技日报</span>
        </div>
        <div class="date-badge">
            <span id="currentDate">2026年4月22日</span>
            <span>·</span>
            <span>每日 AI 资讯精选</span>
        </div>
    </header>
    
    <main id="content">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载今日资讯...</div>
        </div>
    </main>
    
    <footer>
        <p>Powered by <a href="#">OpenClaw</a> · 自动更新于每日 9:00</p>
    </footer>
    
    <script>
        const categoryConfig = {
            llm: { title: '大模型动态', icon: '🧠', color: '#00d4ff' },
            github: { title: 'GitHub 热门', icon: '⭐', color: '#fbbf24' },
            video: { title: '视频生成', icon: '🎬', color: '#f472b6' },
            devtools: { title: '开发工具', icon: '🛠️', color: '#22c55e' },
            rag: { title: '知识库 RAG', icon: '📚', color: '#a78bfa' },
            other: { title: '其他资讯', icon: '💡', color: '#fb923c' }
        };
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('zh-CN', options);
        }
        
        function createCard(item, index) {
            const desc = item.desc.replace(/[#>]/g, '').substring(0, 120);
            return `
                <article class="card" style="animation-delay: ${index * 0.1}s">
                    <h3 class="card-title">${item.title}</h3>
                    <p class="card-desc">${desc}...</p>
                </article>
            `;
        }
        
        function createCategory(key, items) {
            const config = categoryConfig[key];
            if (!items || items.length === 0) return '';
            
            return `
                <section class="category">
                    <div class="category-header">
                        <div class="category-icon">${config.icon}</div>
                        <h2 class="category-title">${config.title}</h2>
                        <div class="category-line"></div>
                    </div>
                    <div class="cards-grid">
                        ${items.slice(0, 3).map((item, i) => createCard(item, i)).join('')}
                    </div>
                </section>
            `;
        }
        
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                document.getElementById('currentDate').textContent = formatDate(data.date);
                
                const content = document.getElementById('content');
                content.innerHTML = '';
                
                const categories = ['llm', 'github', 'video', 'devtools', 'rag', 'other'];
                
                for (const cat of categories) {
                    if (data[cat] && data[cat].length > 0) {
                        content.innerHTML += createCategory(cat, data[cat]);
                    }
                }
                
                if (content.innerHTML === '') {
                    content.innerHTML = '<div class="loading"><div class="loading-text">暂无数据</div></div>';
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('content').innerHTML = 
                    '<div class="loading"><div class="loading-text">数据加载失败，请刷新页面</div></div>';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
