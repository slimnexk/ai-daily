<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 科技日报</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #08090c;
            --bg-secondary: #0d0f12;
            --bg-card: #13161b;
            --bg-card-hover: #1a1d24;
            --accent-cyan: #00e5ff;
            --accent-purple: #a855f7;
            --accent-pink: #ff3d71;
            --accent-yellow: #ffaa00;
            --accent-green: #00d68f;
            --accent-orange: #ff7b00;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: rgba(255,255,255,0.08);
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            overflow-y: auto;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .logo-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        .sidebar-nav {
            padding: 16px 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--text-secondary);
            font-size: 13px;
        }
        .nav-item:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .nav-item.active {
            background: rgba(0, 229, 255, 0.08);
            color: var(--accent-cyan);
        }
        .nav-item-icon { font-size: 16px; width: 20px; text-align: center; }
        .nav-item-count {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .sidebar-stats {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .stat-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
        }
        .stat-number {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-cyan);
        }
        .stat-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .sidebar-categories {
            padding: 16px 12px;
            flex: 1;
        }
        .category-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: var(--text-secondary);
            font-size: 12px;
        }
        .category-item:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .category-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .category-item-name { flex: 1; }
        .category-item-count { font-size: 11px; color: var(--text-muted); }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }
        .footer-text {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }
        .main-content { 
            margin-left: var(--sidebar-width); 
            background: var(--bg-primary); 
            min-height: 100vh;
        }
        .hero {
            padding: 32px 40px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-bottom: 1px solid var(--border-color);
        }
        .hero-date {
            font-size: 13px; color: var(--text-muted);
            display: flex; align-items: center; gap: 8px;
        }
        .hero-date::before {
            content: ''; width: 6px; height: 6px;
            background: var(--accent-green); border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .hero-title {
            font-size: 32px; font-weight: 900; line-height: 1.2;
            margin: 16px 0 12px;
            background: linear-gradient(135deg, #fff 0%, #a0a0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-desc { font-size: 15px; color: var(--text-secondary); max-width: 700px; }
        main { padding: 32px 40px 60px; }
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; }
        .empty-state h2 { font-size: 20px; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }
        footer {
            padding: 24px 40px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }
        footer a { color: var(--accent-cyan); text-decoration: none; }
        @media (max-width: 900px) {
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border-color); }
            .main-content { margin-left: 0; }
            .hero, main, footer { padding-left: 20px; padding-right: 20px; }
            .hero-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">AI 日报</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-item active">
                <span class="nav-item-icon">📅</span>
                <span>今日资讯</span>
                <span class="nav-item-count">0</span>
            </div>
            <div class="nav-item">
                <span class="nav-item-icon">⭐</span>
                <span>热门资讯</span>
                <span class="nav-item-count">0</span>
            </div>
            <div class="nav-item">
                <span class="nav-item-icon">📌</span>
                <span>我的收藏</span>
                <span class="nav-item-count">0</span>
            </div>
        </nav>
        <div class="sidebar-stats">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number">0</div>
                    <div class="stat-text">总资讯</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">0</div>
                    <div class="stat-text">分类</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">0</div>
                    <div class="stat-text">天</div>
                </div>
            </div>
        </div>
        <div class="sidebar-categories">
            <div class="category-title">分类浏览</div>
        </div>
        <div class="sidebar-footer">
            <div class="footer-text">每日 9:00 自动更新</div>
        </div>
    </aside>
    
    <div class="main-content">
        <div class="hero">
            <div class="hero-date">等待更新...</div>
            <h1 class="hero-title">暂无资讯</h1>
            <p class="hero-desc">日报将于每日 9:00 自动抓取并更新内容。</p>
        </div>
        <main>
            <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <h2>今日资讯待生成</h2>
                <p>内容将于每天 9:00（Asia/Shanghai）自动更新，请稍后再来。</p>
            </div>
        </main>
        <footer>
            <p>Powered by <a href="#">OpenClaw</a> · 每日 9:00 自动更新</p>
        </footer>
    </div>
</body>
</html>
